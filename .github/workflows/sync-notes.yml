name: Sync LPU_GenAI Notes

# Mon-Fri, 10:00 and 16:00 IST (UTC+5:30) = 04:30 and 10:30 UTC.
# Auto-stops doing work (and disables itself) after 2026-07-31.
on:
  schedule:
    - cron: "30 4 * * 1-5"
    - cron: "30 10 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check end date
        id: gate
        run: |
          today=$(date -u +%Y-%m-%d)
          cutoff="2026-07-31"
          if [[ "$today" > "$cutoff" ]]; then
            echo "Past cutoff ($cutoff); skipping sync and disabling this workflow."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.gate.outputs.skip == 'false'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.gate.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.gate.outputs.skip == 'false'
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice
          pip install requests Pillow

      - name: Sync notes from source repo
        if: steps.gate.outputs.skip == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/sync_notes.py

      - name: Commit and push if changed
        if: steps.gate.outputs.skip == 'false'
        run: |
          git config user.name "NotBOT"
          git config user.email "notbot@users.noreply.github.com"
          git add Notes
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: sync notes from v0idgy/LPU_GenAI" -m "Done automatically by NotBOT 🤖"
            git pull --rebase origin main
            git push
          fi

      - name: Disable this workflow (past cutoff)
        if: steps.gate.outputs.skip == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow disable "sync-notes.yml" --repo "$GITHUB_REPOSITORY"
